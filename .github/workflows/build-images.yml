# Build and push the Pepper worker + api images to Docker Hub on every
# push to main. This bypasses Railway's BuildKit builder (which has been
# hitting `no space left` on its metadata DB) by building on GitHub-hosted
# runners and pushing pre-built images. Railway then just pulls.
#
# Required GitHub Actions secrets:
#   DOCKERHUB_USERNAME — your Docker Hub username (image namespace)
#   DOCKERHUB_TOKEN    — a Docker Hub Personal Access Token with
#                        Read & Write scope (Account → Security)
#
# After the first successful run, switch each Railway service from
# `Builder: Dockerfile` to `Builder: Docker image` pointing at
#   docker.io/<DOCKERHUB_USERNAME>/pepper-worker:latest
#   docker.io/<DOCKERHUB_USERNAME>/pepper-api:latest

name: Build & push images

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "prisma/**"
      - "scripts/**"
      - "public/**"
      - "compliance/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.ts"
      - "postcss.config.mjs"
      - "components.json"
      - "prisma.config.ts"
      - "Dockerfile"
      - "Dockerfile.api"
      - "Dockerfile.worker"
      - ".dockerignore"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: worker
            dockerfile: Dockerfile.worker
            image: pepper-worker
          - name: api
            dockerfile: Dockerfile.api
            image: pepper-api
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
