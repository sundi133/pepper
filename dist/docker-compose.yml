version: "3.9"

# Pepper SAST - Customer Deployment
# 1. Copy .env.example to .env and fill in your values
# 2. Optionally run setup.sh for automated setup
# 3. Run: docker compose up -d
# 4. Open Pepper in the browser and sign in with your admin credentials

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pepper
      POSTGRES_USER: pepper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pepper"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5

  pepper-api:
    image: ${PEPPER_API_IMAGE:-docker.io/sundi133/pepper}:${PEPPER_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://pepper:${POSTGRES_PASSWORD}@postgres:5432/pepper
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: pepper-artifacts
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?Set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@pepper.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-google/gemini-2.5-flash}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-https://pepper.dev}
      OPENROUTER_TITLE: ${OPENROUTER_TITLE:-Pepper SAST}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    ports:
      - "${PEPPER_PORT:-3000}:3000"

  pepper-worker:
    image: ${PEPPER_WORKER_IMAGE:-docker.io/sundi133/pepper-worker}:${PEPPER_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://pepper:${POSTGRES_PASSWORD}@postgres:5432/pepper
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: pepper-artifacts
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      MAX_LLM_CONCURRENCY: ${MAX_LLM_CONCURRENCY:-2}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-google/gemini-2.5-flash}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENROUTER_REFERER: ${OPENROUTER_REFERER:-https://pepper.dev}
      OPENROUTER_TITLE: ${OPENROUTER_TITLE:-Pepper SAST}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    deploy:
      replicas: ${WORKER_REPLICAS:-1}

volumes:
  pgdata:
  redisdata:
  miniodata:
