# Publishes the Pepper documentation site to GitHub Pages.
#
# Custom domain: https://sast.votal.ai (configured via docs/CNAME)
# Fallback URL:  https://sundi133.github.io/pepper/
#
# Setup checklist (one-time, in the repository settings):
#   1. Settings -> Pages -> Source: "GitHub Actions"
#   2. Settings -> Pages -> Custom domain: enter `sast.votal.ai` and Save
#      (GitHub auto-validates against the CNAME file on each artifact)
#   3. DNS: add a CNAME record at your DNS provider:
#        sast.votal.ai   CNAME   sundi133.github.io
#      Wait for GitHub to provision the Let's Encrypt cert (~5–15 min)
#      then enable "Enforce HTTPS".
#
# Triggers: every push to main that touches `docs/**`, and manual dispatch.

name: Publish docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
